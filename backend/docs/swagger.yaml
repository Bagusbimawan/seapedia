basePath: /api/v1
definitions:
  dto.AddCartItemReq:
    properties:
      product_id:
        type: string
      quantity:
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  dto.AddressResponse:
    properties:
      city:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      label:
        type: string
      street:
        type: string
      zip_code:
        type: string
    type: object
  dto.AdvanceDayResponse:
    properties:
      offset_hours:
        type: integer
    type: object
  dto.CartItemResponse:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    type: object
  dto.CartResponse:
    properties:
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/dto.CartItemResponse'
        type: array
      store_id:
        type: string
    type: object
  dto.CheckoutReq:
    properties:
      address_id:
        type: string
      delivery_method:
        enum:
        - INSTANT
        - NEXT_DAY
        - REGULAR
        type: string
      discount_code:
        type: string
    required:
    - address_id
    - delivery_method
    type: object
  dto.CreateAddressReq:
    properties:
      city:
        maxLength: 100
        minLength: 1
        type: string
      is_default:
        type: boolean
      label:
        maxLength: 100
        minLength: 1
        type: string
      street:
        minLength: 1
        type: string
      zip_code:
        maxLength: 10
        minLength: 1
        type: string
    required:
    - city
    - label
    - street
    - zip_code
    type: object
  dto.CreateProductReq:
    properties:
      description:
        maxLength: 2000
        type: string
      name:
        maxLength: 255
        minLength: 2
        type: string
      price:
        minimum: 1
        type: integer
      stock:
        minimum: 0
        type: integer
    required:
    - name
    - price
    - stock
    type: object
  dto.CreatePromoReq:
    properties:
      code:
        maxLength: 50
        minLength: 2
        type: string
      discount_type:
        enum:
        - PERCENT
        - FIXED
        type: string
      discount_value:
        minimum: 1
        type: integer
      expiry_date:
        type: string
    required:
    - code
    - discount_type
    - discount_value
    - expiry_date
    type: object
  dto.CreateReviewReq:
    properties:
      comment:
        maxLength: 2000
        minLength: 1
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
      reviewer_name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - comment
    - rating
    - reviewer_name
    type: object
  dto.CreateStoreReq:
    properties:
      description:
        maxLength: 2000
        type: string
      name:
        maxLength: 200
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.CreateVoucherReq:
    properties:
      code:
        maxLength: 50
        minLength: 2
        type: string
      discount_type:
        enum:
        - PERCENT
        - FIXED
        type: string
      discount_value:
        minimum: 1
        type: integer
      expiry_date:
        type: string
      remaining_usage:
        minimum: 1
        type: integer
    required:
    - code
    - discount_type
    - discount_value
    - expiry_date
    - remaining_usage
    type: object
  dto.DeliveryJobResponse:
    properties:
      completed_at:
        type: string
      created_at:
        type: string
      driver_user_id:
        type: string
      earning_amount:
        type: integer
      id:
        type: string
      order_id:
        type: string
      taken_at:
        type: string
    type: object
  dto.DiscountResponse:
    properties:
      code:
        type: string
      discount_type:
        type: string
      discount_value:
        type: integer
      expiry_date:
        type: string
      id:
        type: string
      kind:
        type: string
      remaining_usage:
        type: integer
    type: object
  dto.LoginReq:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      active_role:
        type: string
      needs_role_select:
        type: boolean
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.OrderItemResponse:
    properties:
      name_snapshot:
        type: string
      price_snapshot:
        type: integer
      product_id:
        type: string
      quantity:
        type: integer
    type: object
  dto.OrderResponse:
    properties:
      address_snapshot:
        $ref: '#/definitions/order.AddressSnapshot'
      buyer_user_id:
        type: string
      created_at:
        type: string
      deadline_at:
        type: string
      delivery_fee:
        type: integer
      delivery_method:
        type: string
      discount_amount:
        type: integer
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/dto.OrderItemResponse'
        type: array
      status:
        type: string
      store_id:
        type: string
      subtotal:
        type: integer
      tax_amount:
        type: integer
      total:
        type: integer
    type: object
  dto.ProductResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: integer
      stock:
        type: integer
      store_id:
        type: string
    type: object
  dto.RegisterReq:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      phone:
        maxLength: 20
        type: string
      roles:
        items:
          type: string
        minItems: 1
        type: array
      username:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - email
    - password
    - roles
    - username
    type: object
  dto.ReviewResponse:
    properties:
      comment:
        type: string
      created_at:
        type: string
      id:
        type: string
      rating:
        type: integer
      reviewer_name:
        type: string
    type: object
  dto.StoreResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      seller_user_id:
        type: string
    type: object
  dto.SwitchRoleReq:
    properties:
      role:
        enum:
        - SELLER
        - BUYER
        - DRIVER
        type: string
    required:
    - role
    type: object
  dto.TopupReq:
    properties:
      amount:
        minimum: 1
        type: integer
    required:
    - amount
    type: object
  dto.UpdateCartItemReq:
    properties:
      quantity:
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      phone:
        type: string
      roles:
        items:
          type: string
        type: array
      username:
        type: string
    type: object
  dto.ValidateDiscountReq:
    properties:
      code:
        type: string
      subtotal:
        minimum: 1
        type: integer
    required:
    - code
    - subtotal
    type: object
  dto.WalletResponse:
    properties:
      balance:
        type: integer
      id:
        type: string
      user_id:
        type: string
    type: object
  order.AddressSnapshot:
    properties:
      city:
        type: string
      label:
        type: string
      street:
        type: string
      zip_code:
        type: string
    type: object
  response.R:
    properties:
      data: {}
      error:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: Multi-Role Marketplace API for COMPFEST 18
  title: SEAPEDIA API
  version: "1.0"
